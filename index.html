<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous"
        />
        <link href="style.css" rel="stylesheet" />

        <title>E-commerce</title>
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <h2>Store</h2>
                <input type="text" id="search" placeholder="Search Product" />
                <br />
                <input type="number" id="minPrice" placeholder="min. price" />
                <input type="number" id="maxPrice" placeholder="max. price" />
                <h5>Categories</h5>
                <div class="categories">
                    
                    <label>
                        <input
                            type="radio"
                            name="category"
                            value="beauty"
                            checked
                        />
                        Beauty
                    </label>

                    <label>
                        <input type="radio" name="category" value="perfume" />
                        Perfume
                    </label>

                    <label>
                        <input type="radio" name="category" value="furniutues" />
                        Furniture
                    </label>

                    <label>
                        <input type="radio" name="category" value="groseries" />
                        Groceyies
                    </label>
                </div>
                <br>
                <h5>Keywords</h5>

<div class="keywords">
    <div class="keyword-boxes">
  <div class="keyword " data-category="all">All</div>
  <div class="keyword" data-category="cosmetic">Cosmetic</div>
  <div class="keyword" data-category="shoes">Shoes</div>
  <div class="keyword" data-category="watch">Watch</div>
  <div class="keyword" data-category="laptop">Laptop</div>
  <div class="keyword" data-category="mobile">Mobile</div>
</div>
<br>


<button id="fillter-btn">Fitter All</button>
 </div>
</div>
<div class="main">
       <div class="top-bar">
           <select id="sort">
  <option value="default">Fillter</option>
  <option value="cheap">Cheap</option>
  <option value="watch">Expensive</option>
  <option value="shoes">Popular</option>
  
</select>
       </div>
<div class="products" id="productContainer"></div>


  

  
<div id="productContainer" class="products"></div>
<div class="pagination">
    <button id="pre">Previous</button>

    <button class="first" onclick="changepage(1)">1</button>
    <button class="second" onclick="changepage(2)">2</button>
    <button  class="third" onclick="changepage(3)">3</button>
    <button  class="fourth" onclick="changepage(4)">4</button>

    <button class="next">Next</button>
</div> 
 
 
     
     <script src="index.js"></script>
  <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
